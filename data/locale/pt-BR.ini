# Página de Apoio
SupportTitle="Apoiando o Aitum"
SupportText="O Aitum Stream Suite é oferecido gratuitamente pela equipe Aitum para <u>você, a comunidade de streaming</u>.<br /><br />Seu apoio é essencial para nos ajudar a continuar nossa jornada de criar ferramentas úteis que capacitam criadores a produzir conteúdo incrível.<br /><br />Se nossas ferramentas ajudaram a otimizar seus fluxos de trabalho, permitiram que seu canal crescesse ou até te inspiraram a começar a criar conteúdo, por favor considere apoiar nossa equipe.<br /><br /><strong><a href='https://aitum.tv/support-us'>Apoie a equipe Aitum</a></strong>"

# Página de Ajuda
HelpTitle="Obtendo Ajuda com o Aitum Stream Suite"
HelpText="Como o Aitum Stream Suite acabou de ser lançado, ainda estamos descobrindo as questões mais importantes da comunidade.<br /><br />Nas próximas semanas após o lançamento, uma atualização será disponibilizada com um solucionador de problemas dedicado ao Aitum Stream Suite.<br /><br />Até lá, <strong><a href='https://aitum.tv/discord'>entre no nosso Discord para discutir sobre o Aitum Stream Suite e reportar problemas!</a></strong>"


